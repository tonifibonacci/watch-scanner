name: Watch Deal Scanner

on:
  schedule:
    - cron: '0 8,10,12,14,16,18,20,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scraper.py
      - run: |
          git config user.name "watch-scanner-bot"
          git config user.email "bot@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M')"
          git push
